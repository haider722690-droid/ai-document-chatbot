<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatBot · AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&family=Geist+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Geist', sans-serif;
  background: #f7f7f5;
  color: #111;
  display: flex;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ── */
.shell { display: flex; width: 100%; height: 100vh; }

/* ── Sidebar ── */
.sidebar {
  width: 240px;
  min-width: 240px;
  background: #fff;
  border-right: 1px solid #e8e8e4;
  display: flex;
  flex-direction: column;
  z-index: 60;
  transition: transform .35s cubic-bezier(.22,1,.36,1);
}

.brand {
  padding: 20px 18px 16px;
  border-bottom: 1px solid #e8e8e4;
  display: flex;
  align-items: baseline;
  gap: 6px;
}
.brand-name {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 1.6rem;
  color: #111;
  letter-spacing: -.02em;
  line-height: 1;
}
.brand-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #22c55e;
  margin-bottom: 2px;
  flex-shrink: 0;
  box-shadow: 0 0 0 2px rgba(34,197,94,.2);
}

.new-btn {
  margin: 12px;
  padding: 9px;
  border: 1px solid #e8e8e4;
  background: none;
  color: #888;
  border-radius: 7px;
  cursor: pointer;
  font-family: 'Geist Mono', monospace;
  font-size: .65rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  transition: all .18s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
}
.new-btn:hover { border-color: #111; color: #111; background: #f7f7f5; }

.sec-label {
  padding: 10px 18px 6px;
  font-family: 'Geist Mono', monospace;
  font-size: .58rem;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: #bbb;
}

.history { flex: 1; overflow-y: auto; padding: 0 6px; }
.history::-webkit-scrollbar { width: 0; }

.s-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: background .14s;
  position: relative;
}
.s-item:hover { background: #f4f4f0; }
.s-item.active { background: #f0f0ea; }
.s-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 25%; bottom: 25%;
  width: 2px;
  background: #111;
  border-radius: 0 2px 2px 0;
}
.s-num {
  font-family: 'Geist Mono', monospace;
  font-size: .55rem;
  color: #ccc;
  min-width: 16px;
}
.s-name {
  font-size: .82rem;
  color: #777;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.s-item.active .s-name { color: #111; font-weight: 500; }

.s-del {
  background: none;
  border: none;
  color: #ccc;
  cursor: pointer;
  width: 18px; height: 18px;
  border-radius: 3px;
  display: none;
  place-items: center;
  font-size: .8rem;
  transition: color .14s;
}
.s-item:hover .s-del { display: grid; }
.s-del:hover { color: #e03; }

/* ── Main ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* Header */
.header {
  display: flex;
  align-items: center;
  height: 52px;
  padding: 0 24px;
  border-bottom: 1px solid #e8e8e4;
  background: #fff;
  gap: 10px;
  flex-shrink: 0;
}
.ham {
  display: none;
  background: none;
  border: 1px solid #e8e8e4;
  border-radius: 6px;
  width: 28px; height: 28px;
  place-items: center;
  cursor: pointer;
  color: #888;
  flex-shrink: 0;
}
.ham:hover { border-color: #aaa; color: #111; }
.hdr-title {
  flex: 1;
  font-size: .86rem;
  font-weight: 500;
  color: #111;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.hdr-right { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.hdr-btn {
  height: 26px;
  padding: 0 10px;
  border: 1px solid #e8e8e4;
  border-radius: 100px;
  background: none;
  color: #999;
  font-family: 'Geist Mono', monospace;
  font-size: .58rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  transition: all .18s;
  white-space: nowrap;
}
.hdr-btn:hover { border-color: #999; color: #111; }
.hdr-btn.danger:hover { border-color: #e03; color: #e03; background: rgba(238,0,51,.05); }
.hdr-sep { width: 1px; height: 14px; background: #e8e8e4; }

/* Chat */
.chat-wrap { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
.chat-wrap::-webkit-scrollbar { width: 0; }

.chat-inner { padding: 28px 0; display: flex; flex-direction: column; max-width: 760px; margin: 0 auto; width: 100%; }

/* Empty */
.empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 24px 80px;
  gap: 16px;
  text-align: center;
}
.e-mark {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 4rem;
  color: #ddd;
  line-height: 1;
  letter-spacing: -.03em;
}
.e-h { font-size: .95rem; font-weight: 500; color: #111; }
.e-p { font-size: .82rem; color: #aaa; line-height: 1.7; max-width: 280px; font-weight: 300; }
.quick { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; max-width: 380px; margin-top: 4px; }
.qchip {
  background: #fff;
  border: 1px solid #e8e8e4;
  border-radius: 100px;
  padding: 5px 12px;
  font-size: .76rem;
  color: #777;
  cursor: pointer;
  transition: all .18s;
}
.qchip:hover { border-color: #aaa; color: #111; background: #f7f7f5; }

/* Messages */
.m-row {
  display: flex;
  gap: 12px;
  padding: 10px 24px;
  animation: mIn .25s cubic-bezier(.22,1,.36,1) both;
}
@keyframes mIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.m-row.user { flex-direction: row-reverse; }
.m-row + .m-row { border-top: 1px solid #f0f0ea; }

.m-av {
  width: 26px; height: 26px;
  border-radius: 6px;
  flex-shrink: 0;
  display: grid; place-items: center;
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: .9rem;
  margin-top: 2px;
}
.av-u { background: #111; color: #f7f7f5; }
.av-b { background: #f0f0ea; color: #777; border: 1px solid #e8e8e4; }

.m-col { flex: 1; min-width: 0; }
.m-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
.m-row.user .m-meta { flex-direction: row-reverse; }
.m-who {
  font-family: 'Geist Mono', monospace;
  font-size: .58rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: #bbb;
}
.m-ts {
  font-family: 'Geist Mono', monospace;
  font-size: .55rem;
  color: #ddd;
}
.m-body {
  font-size: .88rem;
  line-height: 1.75;
  color: #222;
  font-weight: 300;
  max-width: 600px;
}
.m-row.user .m-col { display: flex; flex-direction: column; align-items: flex-end; }
.m-row.user .m-body {
  background: #111;
  color: #f7f7f5;
  padding: 10px 14px;
  border-radius: 10px 10px 2px 10px;
  font-weight: 400;
  max-width: 480px;
}

/* Typing */
.t-dots { display: flex; gap: 4px; padding: 6px 0; }
.t-d {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: #bbb;
  animation: td 1.1s ease infinite;
}
.t-d:nth-child(2) { animation-delay: .18s; }
.t-d:nth-child(3) { animation-delay: .36s; }
@keyframes td { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-5px);opacity:1} }

/* Composer */
.composer {
  border-top: 1px solid #e8e8e4;
  padding: 14px 24px 18px;
  background: #fff;
  flex-shrink: 0;
}
.c-wrap {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: #f7f7f5;
  border: 1px solid #e0e0d8;
  border-radius: 10px;
  padding: 3px 4px 3px 14px;
  transition: border-color .2s, box-shadow .2s;
  max-width: 760px;
  margin: 0 auto;
}
.c-wrap:focus-within { border-color: #aaa; box-shadow: 0 0 0 3px rgba(0,0,0,.05); }
#msg {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: #111;
  font-family: 'Geist', sans-serif;
  font-size: .88rem;
  font-weight: 300;
  resize: none;
  max-height: 150px;
  line-height: 1.6;
  padding: 10px 0;
  min-height: 42px;
}
#msg::placeholder { color: #bbb; }
.c-send {
  width: 32px; height: 32px;
  border-radius: 7px;
  background: #111;
  border: none;
  color: #f7f7f5;
  display: grid; place-items: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all .18s;
  margin-bottom: 1px;
}
.c-send:hover { background: #333; transform: scale(1.05); }
.c-send:disabled { opacity: .25; pointer-events: none; }
.c-foot {
  display: flex;
  justify-content: space-between;
  margin-top: 7px;
  padding: 0 2px;
  max-width: 760px;
  margin-left: auto;
  margin-right: auto;
}
.c-hint {
  font-family: 'Geist Mono', monospace;
  font-size: .56rem;
  color: #ccc;
  letter-spacing: .04em;
}

/* ── File Section ── */
.file-section {
  border-top: 1px solid #e8e8e4;
  padding: 0 6px 14px;
  flex-shrink: 0;
}
.drop-zone {
  margin: 0 6px 8px;
  border: 1.5px dashed #ddd;
  border-radius: 8px;
  padding: 16px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  transition: all .2s;
  text-align: center;
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: #111;
  background: #f7f7f5;
}
.drop-label {
  font-size: .76rem;
  color: #999;
  font-weight: 400;
}
.drop-sub {
  font-family: 'Geist Mono', monospace;
  font-size: .56rem;
  color: #ccc;
  letter-spacing: .04em;
}
#fileInput { display: none; }

.file-list { display: flex; flex-direction: column; gap: 4px; padding: 0 6px; margin-bottom: 6px; max-height: 130px; overflow-y: auto; }
.file-list::-webkit-scrollbar { width: 0; }

.f-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  background: #f7f7f5;
  border: 1px solid #e8e8e4;
  border-radius: 6px;
  animation: mIn .2s ease both;
}
.f-icon {
  width: 24px; height: 24px;
  border-radius: 4px;
  display: grid; place-items: center;
  font-size: .6rem;
  font-family: 'Geist Mono', monospace;
  font-weight: 500;
  flex-shrink: 0;
  letter-spacing: 0;
}
.icon-pdf  { background: #fee2e2; color: #dc2626; }
.icon-doc  { background: #dbeafe; color: #2563eb; }
.icon-img  { background: #d1fae5; color: #059669; }
.icon-csv  { background: #fef9c3; color: #ca8a04; }
.icon-txt  { background: #f3e8ff; color: #9333ea; }
.icon-file { background: #f3f4f6; color: #6b7280; }

.f-info { flex: 1; min-width: 0; }
.f-name { font-size: .76rem; font-weight: 500; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.f-size { font-family: 'Geist Mono', monospace; font-size: .55rem; color: #aaa; }
.f-status { font-family: 'Geist Mono', monospace; font-size: .55rem; margin-top: 1px; }
.f-status.ok  { color: #22c55e; }
.f-status.err { color: #ef4444; }
.f-status.uploading { color: #f59e0b; }

.f-remove {
  background: none; border: none; color: #ccc;
  cursor: pointer; font-size: .9rem; line-height: 1;
  padding: 2px; border-radius: 3px; transition: color .14s; flex-shrink: 0;
}
.f-remove:hover { color: #e03; }

.upload-btn {
  margin: 0 12px;
  width: calc(100% - 24px);
  padding: 8px;
  background: #111;
  color: #f7f7f5;
  border: none;
  border-radius: 6px;
  font-family: 'Geist Mono', monospace;
  font-size: .62rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  transition: all .18s;
}
.upload-btn:hover { background: #333; }
.upload-btn:disabled { opacity: .4; pointer-events: none; }

/* Overlay */
.veil { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 50; backdrop-filter: blur(4px); }

/* Mobile */
@media (max-width: 700px) {
  .sidebar { position: fixed; top: 0; left: 0; bottom: 0; transform: translateX(-100%); box-shadow: 20px 0 60px rgba(0,0,0,.08); }
  .sidebar.open { transform: translateX(0); }
  .veil.show { display: block; }
  .ham { display: grid; }
  .header { padding: 0 14px; }
  .m-row { padding: 10px 14px; }
  .composer { padding: 10px 14px 14px; }
}
</style>
</head>
<body>
<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sb">
    <div class="brand">
      <span class="brand-name">ChatBot</span>
      <div class="brand-dot"></div>
    </div>

    <button class="new-btn" onclick="newChat()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Chat
    </button>

    <div class="sec-label">History</div>
    <div class="history" id="history"></div>

    <!-- File Attachment Section -->
    <div class="file-section">
      <div class="sec-label" style="padding-top:10px">Attachments</div>
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        <span class="drop-label">Click or drag files here</span>
        <span class="drop-sub">PDF, DOCX, TXT, PNG…</span>
      </div>
      <input type="file" id="fileInput" multiple accept=".pdf,.doc,.docx,.txt,.png,.jpg,.jpeg,.csv,.xlsx" onchange="onFileSelect(this)">
      <div class="file-list" id="fileList"></div>
      <button class="upload-btn" id="uploadBtn" onclick="doUpload()" style="display:none">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
        Upload to Session
      </button>
    </div>
  </aside>

  <div class="veil" id="veil" onclick="closeSB()"></div>

  <!-- MAIN -->
  <div class="main">
    <div class="header">
      <button class="ham" onclick="toggleSB()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="hdr-title" id="hdrTitle">No conversation</div>
      <div class="hdr-right">
        <button class="hdr-btn danger" onclick="clearChat()">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
          Clear
        </button>
      </div>
    </div>

    <div class="chat-wrap" id="chatWrap">
      <div class="chat-inner" id="chatInner">
        <div class="empty" id="emptyEl">
          <div class="e-mark">ChatBot</div>
          <div class="e-h">How can I help you today?</div>
          <div class="e-p">Ask anything — your conversations are saved locally.</div>
          <div class="quick">
            <div class="qchip" onclick="fill('Summarize this for me: ')">Summarize</div>
            <div class="qchip" onclick="fill('Draft a professional email about ')">Draft email</div>
            <div class="qchip" onclick="fill('Explain in simple terms: ')">Explain</div>
            <div class="qchip" onclick="fill('Create an action plan for ')">Action plan</div>
          </div>
        </div>
      </div>
    </div>

    <div class="composer">
      <div class="c-wrap">
        <textarea id="msg" rows="1" placeholder="Message ChatBot…" onkeydown="onKey(event)" oninput="resize(this)"></textarea>
        <button class="c-send" id="sendBtn" onclick="send()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="c-foot">
        <span class="c-hint">Return to send · Shift+Return for new line</span>
      </div>
    </div>
  </div>
</div>

<script>
let chats = JSON.parse(localStorage.getItem('chatbot_chats') || '[]');
let active = null;

init();

function init() { renderList(); }

/* ── Sidebar ── */
function toggleSB() {
  document.getElementById('sb').classList.toggle('open');
  document.getElementById('veil').classList.toggle('show');
}
function closeSB() {
  document.getElementById('sb').classList.remove('open');
  document.getElementById('veil').classList.remove('show');
}

/* ── Chat management ── */
function save() { localStorage.setItem('chatbot_chats', JSON.stringify(chats)); renderList(); }

function newChat() {
  const c = { id: Date.now(), name: 'New conversation', messages: [] };
  chats.unshift(c); active = c;
  save(); renderMsgs(); closeSB();
  setTimeout(() => document.getElementById('msg').focus(), 50);
}

function switchChat(id) {
  active = chats.find(c => c.id === id);
  save(); renderMsgs(); closeSB();
}

function deleteChat(id, e) {
  e.stopPropagation();
  chats = chats.filter(c => c.id !== id);
  if (active?.id === id) { active = null; renderMsgs(); }
  save();
}

function renderList() {
  const el = document.getElementById('history');
  el.innerHTML = '';
  if (!chats.length) {
    el.innerHTML = '<div style="padding:10px 18px;font-size:.78rem;color:#ccc">No history yet</div>';
    return;
  }
  chats.forEach((c, i) => {
    const d = document.createElement('div');
    d.className = 's-item' + (active?.id === c.id ? ' active' : '');
    d.onclick = () => switchChat(c.id);
    d.innerHTML = `
      <span class="s-num">${String(i+1).padStart(2,'0')}</span>
      <span class="s-name">${esc(c.name)}</span>
      <button class="s-del" onclick="deleteChat(${c.id},event)" title="Delete">✕</button>`;
    el.appendChild(d);
  });
}

/* ── Render messages ── */
function renderMsgs() {
  const el = document.getElementById('chatInner');
  el.innerHTML = '';
  document.getElementById('hdrTitle').textContent = active ? active.name : 'No conversation';

  if (!active || !active.messages.length) {
    el.appendChild(buildEmpty());
    return;
  }
  active.messages.forEach(m => el.appendChild(buildRow(m.role, m.text, m.ts)));
  scrollBottom();
}

function buildEmpty() {
  const d = document.createElement('div');
  d.className = 'empty'; d.id = 'emptyEl';
  d.innerHTML = `<div class="e-mark">ChatBot</div><div class="e-h">How can I help you today?</div><div class="e-p">Ask anything — your conversations are saved locally.</div>`;
  return d;
}

function buildRow(role, text, ts) {
  const isU = role === 'user';
  const t = ts || now();
  const d = document.createElement('div');
  d.className = 'm-row ' + role;
  d.innerHTML = `
          <div class="m-av ${isU ? 'av-u' : 'av-b'}">${isU ? 'Y' : 'C'}</div>
    <div class="m-col">
      <div class="m-meta">
        <span class="m-who">${isU ? 'You' : 'ChatBot'}</span>
        <span class="m-ts">${t}</span>
      </div>
      <div class="m-body">${esc(text)}</div>
    </div>`;
  return d;
}

function addTyping() {
  const el = document.getElementById('chatInner');
  document.getElementById('emptyEl')?.remove();
  const d = document.createElement('div');
  d.className = 'm-row bot'; d.id = 'trow';
  d.innerHTML = `
          <div class="m-av av-b">C</div>
    <div class="m-col">
      <div class="m-meta"><span class="m-who">ChatBot</span></div>
      <div class="m-body"><div class="t-dots"><span class="t-d"></span><span class="t-d"></span><span class="t-d"></span></div></div>
    </div>`;
  el.appendChild(d); scrollBottom();
  return d;
}

function appendRow(role, text, ts) {
  const el = document.getElementById('chatInner');
  document.getElementById('emptyEl')?.remove();
  const row = buildRow(role, text, ts);
  el.appendChild(row); scrollBottom();
  return row.querySelector('.m-body');
}

/* ── Send ── */
async function send() {
  if (!active) newChat();
  const inp = document.getElementById('msg');
  const text = inp.value.trim();
  if (!text) return;

  inp.value = ''; resize(inp);
  document.getElementById('sendBtn').disabled = true;

  const ts = now();
  active.messages.push({ role: 'user', text, ts });
  if (active.messages.length === 1) {
    active.name = text.slice(0, 44) + (text.length > 44 ? '…' : '');
    document.getElementById('hdrTitle').textContent = active.name;
  }
  save();
  appendRow('user', text, ts);
  const trow = addTyping();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    trow.remove();
    const bts = now();
    const bub = appendRow('bot', '', bts);
    const reader = res.body.getReader();
    let full = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      full += new TextDecoder().decode(value);
      bub.textContent = full;
      scrollBottom();
    }
    active.messages.push({ role: 'bot', text: full, ts: bts });
    save();
  } catch {
    trow.remove();
    appendRow('bot', '⚠ Could not reach server. Please try again.', now());
  }

  document.getElementById('sendBtn').disabled = false;
}

async function clearChat() {
  if (!active?.messages.length) return;
  if (!confirm('Clear this conversation?')) return;
  try { await fetch('/clear', { method: 'POST' }); } catch {}
  active.messages = []; save(); renderMsgs();
}

function fill(t) {
  if (!active) newChat();
  const el = document.getElementById('msg');
  el.value = t; resize(el); el.focus();
}

/* ── File helpers ── */
let pendingFiles = [];

function getExt(name) { return (name.split('.').pop() || '').toLowerCase(); }
function fmtSize(b) { return b < 1024 ? b+'B' : b < 1048576 ? (b/1024).toFixed(1)+'KB' : (b/1048576).toFixed(1)+'MB'; }
function iconClass(ext) {
  if (['pdf'].includes(ext)) return 'icon-pdf';
  if (['doc','docx'].includes(ext)) return 'icon-doc';
  if (['png','jpg','jpeg','gif','webp'].includes(ext)) return 'icon-img';
  if (['csv','xlsx','xls'].includes(ext)) return 'icon-csv';
  if (['txt','md'].includes(ext)) return 'icon-txt';
  return 'icon-file';
}

function onDragOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('drag-over'); }
function onDragLeave() { document.getElementById('dropZone').classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag-over');
  addFiles([...e.dataTransfer.files]);
}
function onFileSelect(inp) { addFiles([...inp.files]); inp.value = ''; }

function addFiles(files) {
  files.forEach(f => {
    if (pendingFiles.find(p => p.file.name === f.name && p.file.size === f.size)) return;
    pendingFiles.push({ file: f, status: 'pending' });
  });
  renderFileList();
}

function removeFile(idx) {
  pendingFiles.splice(idx, 1);
  renderFileList();
}

function renderFileList() {
  const el = document.getElementById('fileList');
  const btn = document.getElementById('uploadBtn');
  el.innerHTML = '';
  pendingFiles.forEach((p, i) => {
    const ext = getExt(p.file.name);
    const d = document.createElement('div');
    d.className = 'f-item';
    const statusHtml = p.status === 'ok'
      ? '<div class="f-status ok">✓ Uploaded</div>'
      : p.status === 'err'
      ? '<div class="f-status err">✗ Failed</div>'
      : p.status === 'uploading'
      ? '<div class="f-status uploading">Uploading…</div>'
      : '';
    d.innerHTML = `
      <div class="f-icon ${iconClass(ext)}">${ext.toUpperCase().slice(0,3)}</div>
      <div class="f-info">
        <div class="f-name">${esc(p.file.name)}</div>
        <div class="f-size">${fmtSize(p.file.size)}</div>
        ${statusHtml}
      </div>
      ${p.status !== 'uploading' ? `<button class="f-remove" onclick="removeFile(${i})" title="Remove">✕</button>` : ''}`;
    el.appendChild(d);
  });
  const hasPending = pendingFiles.some(p => p.status === 'pending');
  btn.style.display = pendingFiles.length ? 'flex' : 'none';
  btn.disabled = !hasPending;
  btn.textContent = hasPending ? 'Upload to Session' : 'All Uploaded';
  if (hasPending) btn.prepend(Object.assign(document.createElement('span'), {innerHTML: `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>`}));
}

async function doUpload() {
  if (!active) newChat();
  const toUpload = pendingFiles.filter(p => p.status === 'pending');
  if (!toUpload.length) return;

  document.getElementById('uploadBtn').disabled = true;

  for (const p of toUpload) {
    p.status = 'uploading';
    renderFileList();
    try {
      const fd = new FormData();
      fd.append('file', p.file);
      fd.append('session_id', String(active.id));
      await fetch('/upload', { method: 'POST', body: fd });
      p.status = 'ok';
    } catch {
      p.status = 'err';
    }
    renderFileList();
  }
}
function resize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 150) + 'px'; }
function scrollBottom() { const w = document.getElementById('chatWrap'); w.scrollTop = w.scrollHeight; }
function now() { return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
